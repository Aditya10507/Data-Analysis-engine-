x-backend-env: &backend-env
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://analyst:analyst_password@postgres:5432/analyst}
  ASYNC_DATABASE_URL: ${ASYNC_DATABASE_URL:-postgresql+asyncpg://analyst:analyst_password@postgres:5432/analyst}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_BUCKET: ${S3_BUCKET:-ai-analyst-files}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: ai-data-analyst-frontend:prod
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ai-data-analyst-backend:prod
    command: >
      gunicorn app.main:app
      --bind 0.0.0.0:8000
      --workers ${WEB_CONCURRENCY:-2}
      --worker-class uvicorn.workers.UvicornWorker
      --timeout 120
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  celery-worker:
    image: ai-data-analyst-backend:prod
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-analyst}
      POSTGRES_USER: ${POSTGRES_USER:-analyst}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analyst_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    environment:
      S3_BUCKET: ${S3_BUCKET:-ai-analyst-files}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts/create-minio-bucket.sh:/scripts/create-minio-bucket.sh:ro
    entrypoint: ["/bin/sh", "/scripts/create-minio-bucket.sh"]

  loki:
    image: grafana/loki:3.5.1
    command: -config.file=/etc/loki/local-config.yaml
    ports: ["${LOKI_PORT:-3100}:3100"]
    volumes: ["./observability/loki.yaml:/etc/loki/local-config.yaml:ro", "loki_data:/loki"]
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.5.1
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    volumes: ["./observability/promtail.yaml:/etc/promtail/config.yaml:ro", "/var/lib/docker/containers:/var/lib/docker/containers:ro", "/var/run/docker.sock:/var/run/docker.sock:ro"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    environment: {GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"}
    ports: ["${GRAFANA_PORT:-3000}:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  loki_data:
  grafana_data:
