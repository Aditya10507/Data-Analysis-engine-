app = "ai-data-analyst-backend"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  JWT_ALGORITHM = "HS256"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[deploy]
  release_command = "alembic -c alembic.ini upgrade head"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
